# .github/workflows/release.yaml
name: Release xMLTree Editor

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_name: xMLTree-linux
            script_path: src/xMLTree.py
            built_file: dist/xMLTree
            artifact_name: xMLTree-linux

          - os: windows-latest
            exe_name: xMLTree.exe
            script_path: src/xMLTree.py
            built_file: dist/xMLTree.exe
            artifact_name: xMLTree-windows

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag (Cross-platform)
        id: get_version
        run: |
          # Extract version from GITHUB_REF (e.g., refs/tags/v1.4.1)
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Windows PowerShell
            $version = "${{ github.ref_name }}".Replace('v', '')
            echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            echo "Building version: $version"
          else
            # Linux/macOS bash
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "Building version: ${VERSION}"
          fi
        shell: bash  # Force bash shell even on Windows

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          pyinstaller \
            --onefile \
            --windowed \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --hidden-import numpy \
            --collect-submodules pandas \
            --collect-submodules openpyxl \
            --name "xMLTree-$VERSION" \
            ${{ matrix.script_path }}

      - name: Rename output file
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv "dist/xMLTree-$VERSION" "dist/xMLTree-$VERSION-linux"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: rename the .exe file
            mv "dist/xMLTree-$VERSION.exe" "dist/xMLTree-$VERSION.exe"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/xMLTree-${{ steps.get_version.outputs.version }}*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          # Simple bash command since this runs on ubuntu
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # Copy all executables
          find release-artifacts -type f \( -name "*.exe" -o -name "xMLTree-*" \) -exec cp {} release-files/ \;
          # Copy any additional files
          cp assets/xMLTree-linux.png release-files/ 2>/dev/null || true
          echo "Files to release:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "xMLTree Editor v${{ steps.get_version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true