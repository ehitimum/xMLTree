# .github/workflows/release.yaml
name: Release xMLTree Editor

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe_name: xMLTree-linux
            script_path: src/xMLTree.py
            built_file: dist/xMLTree
            artifact_name: xMLTree-linux

          - os: windows-latest
            exe_name: xMLTree.exe
            script_path: src/xMLTree.py
            built_file: dist/xMLTree.exe
            artifact_name: xMLTree-windows

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        shell: bash  # Force bash shell for both Windows and Linux
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            pyinstaller --onefile --windowed --icon icons/xMLTree.png --add-data "icons/xMLTree.png:icons" --add-data "icons/day.png:icons" --add-data "icons/night.png:icons" --hidden-import pandas --hidden-import openpyxl --hidden-import numpy --collect-submodules pandas --collect-submodules openpyxl --name "xMLTree-$VERSION" ${{ matrix.script_path }}
          else
            pyinstaller --onefile --windowed --icon icons/xMLTree.png --add-data "icons/xMLTree.png;icons" --add-data "icons/day.png;icons" --add-data "icons/night.png;icons" --hidden-import pandas --hidden-import openpyxl --hidden-import numpy --collect-submodules pandas --collect-submodules openpyxl --name "xMLTree-$VERSION" ${{ matrix.script_path }}
          fi

      - name: Rename output file
        shell: bash  # Force bash shell for both Windows and Linux
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv "dist/xMLTree-$VERSION" "dist/xMLTree-$VERSION-linux"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/xMLTree-${{ steps.get_version.outputs.version }}*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # Copy all executables
          find release-artifacts -type f \( -name "*.exe" -o -name "xMLTree-*" \) -exec cp {} release-files/ \;
          # Copy any additional files
          cp assets/xMLTree-linux.png release-files/ 2>/dev/null || true
          echo "Files to release:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "xMLTree Editor v${{ steps.get_version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true